<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Login</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <header>
        <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">Sistema</span>
            </div>
        </nav>
    </header>

    <main class="d-flex justify-content-center align-items-center vh-100">
        <div>
            <img src="assets/estrela-da-morte" alt="">
        </div>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-4">

                    <div class="card shadow p-4">
                        <h2 class="text-center mb-4">Login</h2>

                        <form id="form-login">

                            <div class="mb-3">
                                <label for="email" class="form-label">Email:</label>
                                <input type="email" class="form-control" id="email" placeholder="Digite seu email">
                            </div>

                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha:</label>
                                <input type="password" class="form-control" id="senha" placeholder="Digite sua senha">
                            </div>

                            <button id="botao-envio" type="submit" class="btn btn-primary w-100">
                                Entrar
                            </button>

                        </form>

                        <div id="mensagem" class="mt-3 text-center"></div>

                        <div class="text-center mt-3">
                            <p class="mb-0">Não tem conta? <a href="#" id="toggle">Cadastre-se!!</a></p>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-3">
        <small>© 2026 Sistema de Login</small>
    </footer>

    <script src="scripts/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
